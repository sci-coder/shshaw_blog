baseURL: https://sci-coder.github.io/shshaw_blog/
languageCode: en-us
defaultContentLanguage: en
title: Hashed Science
theme: congo  # Use Congo for production (requires Hugo 0.115+)

# Disable RSS to fix the error
disableKinds:
  - RSS
  - sitemap

params:
  # Site description
  description: "Welcome to Hashed Science - Blogs about Physics, Computation, AI, Evolution and Simulation"
  author: "Your Name"

  # Show reading time
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true

  # Home page configuration
  profileMode:
    enabled: true
    title: "Blogs about Physics, Computation, AI, Evolution and Simulation"
    subtitle: "Welcome to my personal blog where I share my thoughts and ideas"
    imageUrl: "" # You can add a profile image URL later
    imageTitle: "Profile Picture"
    buttons:
      - name: Posts
        url: posts
      - name: GitHub
        url: "https://github.com/sci-coder"

  # Social Icons (update with your links)
  socialIcons:
    - name: github
      url: "https://github.com/sci-coder"
    - name: twitter
      url: "https://twitter.com/YOUR-TWITTER-USERNAME"
    - name: linkedin
      url: "https://linkedin.com/in/YOUR-LINKEDIN-USERNAME"

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: about
      name: About
      url: /about/
      weight: 20
    - identifier: bimbo-ball
      name: Bimbo Ball
      url: /bimbo-ball/
      weight: 27
    - identifier: search
      name: Search
      url: /search/
      weight: 30
    # Example: External Quarto site link
    # - identifier: external-quarto
    #   name: "📊 Data Science"
    #   url: "https://sci-coder.github.io/quarto-site/"
    #   weight: 40
    #   params:
    #     external: true

# Enable search (without RSS)
outputs:
  home:
    - HTML
    - JSON

# Allow raw HTML in markdown files (needed for animations)
markup:
  goldmark:
    renderer:
      unsafe: true